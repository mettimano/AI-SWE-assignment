# Lumé evaluation cases
#
# Structure:
#   id          — unique case ID
#   description — human-readable summary
#   user_id     — optional; null for anonymous, "_seed_giulia" for returning-user cases
#   multi_turn  — true when state flows across turns
#   turns       — list of {message, expected_mode?, checks?}
#
# checks dict per turn: each key maps to a check function in deterministic.py.
#   - true/false: apply the check with default params
#   - string value (mode_matches, language_match): compare against this value

cases:

  # ── Single-turn: retrieval correctness ───────────────────────────────────────

  - id: C01
    description: "Explicit fragrance with budget and gender"
    user_id: null
    multi_turn: false
    turns:
      - message: "un EDP legnoso da uomo, budget 100"
        expected_mode: answer
        checks:
          mode_matches: answer
          budget_respected: true
          in_stock_first: true
          cite_only_catalog: true
          no_markdown: true
          no_medical_claims: true
          max_emoji_1: true

